# Conda env spec for the Barcode_merge_nanopore pipeline.
# Create from scratch with:
#     conda env create -f environment.yml
#     conda activate barcode_merge_nanopore
#
# (On cluster1 the equivalent env is already provided as `python_collection` —
#  use that instead if it has all the tools below. Check with `samtools --version`,
#  `minimap2 --version`, `bamCoverage --version`.)

name: central
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core alignment / BAM manipulation
  - samtools>=1.18
  - minimap2>=2.26          # used as fallback if dorado isn't on PATH
  - htslib>=1.18

  # Coverage / bigwig generation
  - deeptools>=3.5.4         # provides bamCoverage

  # Plot QC
  - python>=3.9
  - matplotlib>=3.7
  - numpy>=1.24

  # Utility
  - awk
